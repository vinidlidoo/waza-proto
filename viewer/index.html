<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Waza Proto viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #eee;
      font: 14px -apple-system, system-ui, sans-serif; }
    #status { position: fixed; top: 12px; left: 12px; padding: 6px 10px;
      background: rgba(0,0,0,0.6); border-radius: 4px; }
    #status.connected { background: rgba(0,128,0,0.7); }
    #status.error { background: rgba(180,0,0,0.7); }
    #enable-audio { position: fixed; top: 12px; right: 12px; display: none;
      padding: 6px 10px; border: 0; border-radius: 4px; cursor: pointer;
      background: rgba(0,128,0,0.85); color: #fff;
      font: 14px -apple-system, system-ui, sans-serif; }
    #debug-stats { position: fixed; right: 12px; bottom: 12px; display: none;
      min-width: 260px; max-width: 360px; padding: 8px 10px; line-height: 1.35;
      background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap; }
    #debug-stats a { color: #8bd3ff; }
    #video-slot { display: flex; align-items: center; justify-content: center;
      height: 100%; }
    #video-slot video {
      aspect-ratio: 9 / 16;
      width: 504px;
      max-width: 100vw;
      max-height: 100dvh;
      height: auto;
      background: #000;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="status">starting…</div>
  <button id="enable-audio">🔊 Tap to enable coach audio</button>
  <div id="debug-stats"></div>
  <div id="video-slot"></div>

  <script type="module">
    import { Room, RoomEvent, Track, DisconnectReason }
      from 'https://cdn.jsdelivr.net/npm/livekit-client/+esm';

    const statusEl = document.getElementById('status');
    const slotEl = document.getElementById('video-slot');
    const debugEl = document.getElementById('debug-stats');
    const enableAudioBtn = document.getElementById('enable-audio');
    const PROFILE_TOPIC = 'waza.profile';
    const PROFILE_STAGE = 1;
    const FREEZE_GAP_MS = 150;
    const debugStats = new URLSearchParams(location.search).get('debugStats') === '1';
    const autoSaveProfile = debugStats && ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
    const decoder = new TextDecoder();

    let currentTrack;
    let currentVideo;
    let publisherIdentity;
    let renderFrameCount = 0;
    let freezeCount = 0;
    let freezeMaxGapMs = 0;
    let lastRenderCallbackMs;
    let activeProfile;
    const audioEls = new Set();

    // Play a remote audio element (the coach's voice). Browsers block unmuted
    // autoplay without a user gesture, so on rejection we reveal a button that
    // retries every pending element from inside a click handler.
    function playAudio(el) {
      el.play().then(() => {
        if ([...audioEls].every((a) => !a.paused)) enableAudioBtn.style.display = 'none';
      }).catch(() => { enableAudioBtn.style.display = 'block'; });
    }
    enableAudioBtn.addEventListener('click', () => audioEls.forEach(playAudio));

    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    function epochMs() {
      return Date.now();
    }

    function jsonLine(obj) {
      return `${JSON.stringify(obj)}\n`;
    }

    function setDebug(text) {
      if (!debugStats) return;
      debugEl.style.display = 'block';
      debugEl.textContent = text;
    }

    function appendDebugLink(label, href, filename) {
      if (!debugStats) return;
      debugEl.style.display = 'block';
      const text = debugEl.textContent;
      debugEl.textContent = `${text}\n`;
      const link = document.createElement('a');
      link.href = href;
      link.download = filename;
      link.textContent = label;
      debugEl.append(link);
    }

    async function saveProfileToLocalServer(profile, body) {
      if (!autoSaveProfile) return false;
      const res = await fetch(`/api/profile-capture?run_id=${encodeURIComponent(profile.runId)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/jsonl' },
        body,
      });
      if (!res.ok) {
        const message = await res.text().catch(() => res.statusText);
        throw new Error(message || res.statusText);
      }
      return true;
    }

    function trackRenderFrames(video) {
      renderFrameCount = 0;
      freezeCount = 0;
      freezeMaxGapMs = 0;
      lastRenderCallbackMs = undefined;
      if (!('requestVideoFrameCallback' in HTMLVideoElement.prototype)) return;

      const onFrame = (_now, metadata) => {
        if (video !== currentVideo) return;
        const mediaMs = metadata?.mediaTime != null ? metadata.mediaTime * 1000 : performance.now();
        if (lastRenderCallbackMs != null) {
          const gap = mediaMs - lastRenderCallbackMs;
          if (gap > FREEZE_GAP_MS) {
            freezeCount += 1;
            freezeMaxGapMs = Math.max(freezeMaxGapMs, gap);
          }
        }
        lastRenderCallbackMs = mediaMs;
        renderFrameCount += 1;
        video.requestVideoFrameCallback(onFrame);
      };
      video.requestVideoFrameCallback(onFrame);
    }

    function delta(profile, key, current) {
      if (current == null) return null;
      const previous = profile.lastTotals[key];
      profile.lastTotals[key] = current;
      if (previous == null) return null;
      return current >= previous ? current - previous : null;
    }

    function firstVideoStat(report, type) {
      if (!report) return undefined;
      for (const stat of report.values()) {
        if (stat.type !== type) continue;
        if (stat.kind === 'video' || stat.mediaType === 'video') return stat;
      }
      return undefined;
    }

    async function collectProfileWindow() {
      const profile = activeProfile;
      if (!profile || !currentTrack) return;

      const windowStart = epochMs();
      const report = await currentTrack.getRTCStatsReport?.();
      const inbound = firstVideoStat(report, 'inbound-rtp');
      const quality = currentVideo?.getVideoPlaybackQuality?.();
      const renderedTotal = renderFrameCount;
      const freezeTotal = freezeCount;
      const freezeMax = freezeMaxGapMs;

      const jitterBufferTargetDelayMs =
        inbound?.jitterBufferTargetDelay != null ? inbound.jitterBufferTargetDelay * 1000 : null;
      const jitterMs = inbound?.jitter != null ? inbound.jitter * 1000 : null;

      const metrics = {
        inbound_width: inbound?.frameWidth ?? currentVideo?.videoWidth ?? null,
        inbound_height: inbound?.frameHeight ?? currentVideo?.videoHeight ?? null,
        inbound_fps: inbound?.framesPerSecond ?? null,
        frames_decoded_delta: delta(profile, 'framesDecoded', inbound?.framesDecoded),
        frames_dropped_delta: delta(profile, 'framesDropped', inbound?.framesDropped),
        packets_lost_delta: delta(profile, 'packetsLost', inbound?.packetsLost),
        // keyFramesDecoded advancing = the viewer is resyncing on IDRs; its
        // run-total rate is DAT's GOP cadence. pliCount = how often the decoder
        // begged for a keyframe — the PLI-deadlock signature (plan 17).
        key_frames_decoded_delta: delta(profile, 'keyFramesDecoded', inbound?.keyFramesDecoded),
        pli_count_delta: delta(profile, 'pliCount', inbound?.pliCount),
        jitter_ms: jitterMs,
        jitter_buffer_target_delay_ms: jitterBufferTargetDelayMs,
        rendered_frames_delta: delta(profile, 'renderedFrames', renderedTotal),
        playout_dropped_frames_delta: delta(profile, 'playoutDroppedFrames', quality?.droppedVideoFrames),
        freeze_events_delta: delta(profile, 'freezeEvents', freezeTotal),
        freeze_max_gap_ms: freezeMax || null,
      };

      profile.lines.push(jsonLine({
        schema_version: 1,
        event: 'profile_window',
        run_id: profile.runId,
        side: 'viewer',
        source: profile.source,
        stage: PROFILE_STAGE,
        window_start_epoch_ms: windowStart,
        window_duration_ms: profile.lastWindowStart == null ? 1000 : Math.max(windowStart - profile.lastWindowStart, 1),
        metrics,
      }));
      profile.lastWindowStart = windowStart;
      setDebug(
        `profiling ${profile.source}\n` +
        `run ${profile.runId}\n` +
        `recv ${metrics.inbound_fps ?? '?'} fps ${metrics.inbound_width ?? '?'}x${metrics.inbound_height ?? '?'}\n` +
        `drop ${metrics.frames_dropped_delta ?? 0} freeze ${metrics.freeze_events_delta ?? 0}`
      );
    }

    function startViewerProfile(message) {
      stopViewerProfile({ incomplete: true, createDownload: false });
      const runId = message.run_id;
      activeProfile = {
        runId,
        source: message.source,
        durationMs: message.duration_ms,
        lines: [],
        lastTotals: {},
        lastWindowStart: undefined,
      };
      activeProfile.lines.push(jsonLine({
        schema_version: 1,
        event: 'run_start',
        run_id: runId,
        side: 'viewer',
        source: message.source,
        stage: PROFILE_STAGE,
        process_start_epoch_ms: Math.round(performance.timeOrigin),
        duration_ms: message.duration_ms,
      }));
      activeProfile.interval = setInterval(collectProfileWindow, 1000);
      activeProfile.timeout = setTimeout(() => {
        stopViewerProfile({ incomplete: false, createDownload: true });
      }, message.duration_ms);
      setDebug(`profiling ${message.source}\nrun ${runId}\nwaiting for stats…`);
    }

    function stopViewerProfile({ incomplete, createDownload = true } = { incomplete: false }) {
      const profile = activeProfile;
      if (!profile) return;
      clearInterval(profile.interval);
      clearTimeout(profile.timeout);
      profile.lines.push(jsonLine({
        schema_version: 1,
        event: 'run_stop',
        run_id: profile.runId,
        side: 'viewer',
        source: profile.source,
        stage: PROFILE_STAGE,
        incomplete,
      }));
      activeProfile = undefined;
      if (!createDownload) return;
      const filename = `${profile.runId}-viewer.jsonl`;
      const body = profile.lines.join('');
      const blob = new Blob(profile.lines, { type: 'application/jsonl' });
      const href = URL.createObjectURL(blob);
      setDebug(`profile complete\n${profile.runId}`);
      appendDebugLink(filename, href, filename);
      saveProfileToLocalServer(profile, body)
        .then((saved) => {
          if (saved) setDebug(`profile saved\n${filename}`);
        })
        .catch((err) => console.warn('profile auto-save failed:', err));
    }

    const invite = new URLSearchParams(location.search).get('invite');
    if (!invite) {
      setStatus('this link is missing an invite — ask the publisher for a fresh URL', 'error');
      throw new Error('missing invite');
    }

    async function fetchToken() {
      const res = await fetch(`/api/viewer-token?invite=${encodeURIComponent(invite)}`);
      if (res.ok) return res.json();
      const { error } = await res.json().catch(() => ({ error: 'unknown' }));
      throw new Error(error);
    }

    function showFetchError(err) {
      const msg = {
        missing_invite: 'this link is missing an invite — ask the publisher for a fresh URL',
        invalid_invite: 'this link is invalid — ask the publisher for a fresh URL',
        invite_expired: 'this link has expired (links last 3 hours) — ask the publisher for a fresh URL',
      }[err.message] || `error: ${err.message}`;
      setStatus(msg, 'error');
    }

    const room = new Room();
    let reconnecting = false;

    // Derive status from (room.state, currentTrack). Avoids races where an
    // imperative setStatus() after `await room.connect()` overwrites the
    // "receiving from …" that TrackSubscribed already set when the publisher
    // was streaming before the viewer joined.
    function refreshStatus() {
      if (currentTrack && publisherIdentity) {
        setStatus(`receiving video from ${publisherIdentity}`, 'connected');
        return;
      }
      switch (room.state) {
        case 'connected':
          setStatus(`connected to ${room.name} — waiting for video…`, 'connected');
          break;
        case 'reconnecting':
          setStatus('reconnecting…');
          break;
        case 'connecting':
          setStatus('connecting…');
          break;
        default:
          setStatus('disconnected', 'error');
      }
    }

    room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
      if (track.kind === Track.Kind.Audio) {
        // The coach (agent) voice. Attach an <audio> and play it; no <video>
        // slot involved, and we never mute it (that's the whole point).
        const el = track.attach();
        el.autoplay = true;
        audioEls.add(el);
        document.body.appendChild(el);
        playAudio(el);
        return;
      }
      if (track.kind !== Track.Kind.Video) return;
      const el = track.attach();
      currentTrack = track;
      currentVideo = el;
      publisherIdentity = participant.identity;
      el.autoplay = true;
      el.muted = true;        // required for autoplay on a dynamically-injected element after a publisher source swap
      el.playsInline = true;
      slotEl.replaceChildren(el);
      trackRenderFrames(el);
      el.play().catch((err) => console.warn('autoplay rejected:', err));
      refreshStatus();
    });

    room.on(RoomEvent.TrackUnsubscribed, (track) => {
      track.detach().forEach((el) => { el.remove(); audioEls.delete(el); });
      if (audioEls.size === 0) enableAudioBtn.style.display = 'none';
      if (track === currentTrack) {
        currentTrack = undefined;
        currentVideo = undefined;
        publisherIdentity = undefined;
        refreshStatus();
      }
    });

    room.on(RoomEvent.DataReceived, (payload, participant, kind, topic) => {
      if (!debugStats) return;
      if (topic && topic !== PROFILE_TOPIC) return;
      try {
        const message = JSON.parse(decoder.decode(payload));
        if (message.type === 'profile-run-start') {
          startViewerProfile(message);
        } else if (message.type === 'profile-run-stop') {
          stopViewerProfile({ incomplete: Boolean(message.incomplete), createDownload: true });
        }
      } catch (err) {
        console.warn('ignored profile data packet:', err);
      }
    });

    room.on(RoomEvent.Disconnected, async (reason) => {
      console.log('disconnected, reason:', reason);
      stopViewerProfile({ incomplete: true, createDownload: true });
      // LiveKit JWT TTL is 10min; the invite envelope is 3h. On TOKEN_EXPIRED,
      // try once to mint a fresh JWT — succeeds if the invite is still valid,
      // surfaces invite_expired otherwise.
      if (reason === DisconnectReason.TOKEN_EXPIRED && !reconnecting) {
        reconnecting = true;
        setStatus('token expired, refreshing…');
        try {
          const { token, url } = await fetchToken();
          await room.connect(url, token);
          refreshStatus();
        } catch (err) {
          showFetchError(err);
        } finally {
          reconnecting = false;
        }
        return;
      }
      refreshStatus();
    });

    room.on(RoomEvent.ConnectionStateChanged, (state) => {
      console.log('connection state:', state);
      if (!reconnecting) refreshStatus();
    });

    setStatus('connecting…');
    try {
      const { token, url } = await fetchToken();
      await room.connect(url, token);
      refreshStatus();
    } catch (err) {
      if (err.message && ['missing_invite', 'invalid_invite', 'invite_expired'].includes(err.message)) {
        showFetchError(err);
      } else {
        console.error(err);
        setStatus(`error: ${err.message}`, 'error');
      }
    }
  </script>
</body>
</html>
