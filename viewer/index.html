<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Waza Proto viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #eee;
      font: 14px -apple-system, system-ui, sans-serif; }
    #status { position: fixed; top: 12px; left: 12px; padding: 6px 10px;
      background: rgba(0,0,0,0.6); border-radius: 4px; }
    #status.connected { background: rgba(0,128,0,0.7); }
    #status.error { background: rgba(180,0,0,0.7); }
    #video-slot { display: flex; align-items: center; justify-content: center;
      height: 100%; }
    #video-slot video { max-width: 100%; max-height: 100%; background: #000; }
  </style>
</head>
<body>
  <div id="status">starting…</div>
  <div id="video-slot"></div>

  <script type="module">
    import { Room, RoomEvent, Track, DisconnectReason }
      from 'https://cdn.jsdelivr.net/npm/livekit-client/+esm';

    const statusEl = document.getElementById('status');
    const slotEl = document.getElementById('video-slot');

    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    const invite = new URLSearchParams(location.search).get('invite');
    if (!invite) {
      setStatus('this link is missing an invite — ask the publisher for a fresh URL', 'error');
      throw new Error('missing invite');
    }

    async function fetchToken() {
      const res = await fetch(`/api/token?invite=${encodeURIComponent(invite)}`);
      if (res.ok) return res.json();
      const { error } = await res.json().catch(() => ({ error: 'unknown' }));
      throw new Error(error);
    }

    function showFetchError(err) {
      const msg = {
        missing_invite: 'this link is missing an invite — ask the publisher for a fresh URL',
        invalid_invite: 'this link is invalid — ask the publisher for a fresh URL',
        invite_expired: 'this link has expired (links last 3 hours) — ask the publisher for a fresh URL',
      }[err.message] || `error: ${err.message}`;
      setStatus(msg, 'error');
    }

    const room = new Room();
    let reconnecting = false;

    room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
      if (track.kind !== Track.Kind.Video) return;
      const el = track.attach();
      el.autoplay = true;
      el.muted = true;        // required for autoplay on a dynamically-injected element after a publisher source swap
      el.playsInline = true;
      slotEl.replaceChildren(el);
      el.play().catch((err) => console.warn('autoplay rejected:', err));
      setStatus(`receiving video from ${participant.identity}`, 'connected');
    });

    room.on(RoomEvent.TrackUnsubscribed, (track) => {
      track.detach().forEach((el) => el.remove());
      setStatus(`connected to ${room.name} — waiting for video…`, 'connected');
    });

    room.on(RoomEvent.Disconnected, async (reason) => {
      console.log('disconnected, reason:', reason);
      // LiveKit JWT TTL is 10min; the invite envelope is 3h. On TOKEN_EXPIRED,
      // try once to mint a fresh JWT — succeeds if the invite is still valid,
      // surfaces invite_expired otherwise.
      if (reason === DisconnectReason.TOKEN_EXPIRED && !reconnecting) {
        reconnecting = true;
        setStatus('token expired, refreshing…');
        try {
          const { token, url } = await fetchToken();
          await room.connect(url, token);
          setStatus(`connected to ${room.name} — waiting for video…`, 'connected');
        } catch (err) {
          showFetchError(err);
        } finally {
          reconnecting = false;
        }
        return;
      }
      setStatus('disconnected', 'error');
    });

    room.on(RoomEvent.ConnectionStateChanged, (state) => {
      console.log('connection state:', state);
    });

    setStatus('connecting…');
    try {
      const { token, url } = await fetchToken();
      await room.connect(url, token);
      setStatus(`connected to ${room.name} — waiting for video…`, 'connected');
    } catch (err) {
      if (err.message && ['missing_invite', 'invalid_invite', 'invite_expired'].includes(err.message)) {
        showFetchError(err);
      } else {
        console.error(err);
        setStatus(`error: ${err.message}`, 'error');
      }
    }
  </script>
</body>
</html>
